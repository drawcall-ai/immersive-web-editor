name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Check package contents
        run: pnpm check:package

      - name: Typecheck
        run: pnpm typecheck

      - name: Test adapter package
        run: pnpm --filter @immersive-web-editor/adapter test

      - name: Test AI package
        run: pnpm --filter @immersive-web-editor/ai test
