name: Deploy Packages

on:
  push:
    tags:
      - "*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Prepare packages for publishing
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const version = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          if (!/^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Tag ${process.env.GITHUB_REF_NAME} is not a semver version tag`);
          }
          const publishExports = {
            ai: {
              '.': {
                types: './dist/index.d.ts',
                import: './dist/index.js',
              },
            },
            'immersive-web-editor': {
              '.': {
                types: './dist/index.d.ts',
                browser: './dist/client-public.js',
                import: './dist/index.js',
              },
            },
            ui: {
              '.': {
                types: './dist/index.d.ts',
                import: './dist/index.js',
              },
            },
          };
          for (const [dir, exports] of Object.entries(publishExports)) {
            const file = path.join('packages', dir, 'package.json');
            if (!fs.existsSync(file)) continue;
            const json = JSON.parse(fs.readFileSync(file, 'utf8'));
            json.version = version;
            json.exports = exports;
            if (json.dependencies) {
              for (const name of ['@immersive-web-editor/ui', 'immersive-web-editor']) {
                if (json.dependencies[name]?.startsWith('workspace:')) {
                  json.dependencies[name] = version;
                }
              }
            }
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }
          NODE

      - name: Copy README
        run: cp README.md packages/immersive-web-editor/README.md

      - name: Publish UI package
        working-directory: packages/ui
        run: npm publish --access public

      - name: Publish editor package
        working-directory: packages/immersive-web-editor
        run: npm publish --access public

      - name: Publish AI package
        working-directory: packages/ai
        run: npm publish --access public
